# Dummy OpenAI values
openai.apiKey=test-key
openai.embeddingModel=text-embedding-3-small

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Override Postgres-specific settings for H2
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Map Postgres-specific types to H2-compatible ones
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR
spring.datasource.hikari.connection-init-sql=CREATE DOMAIN IF NOT EXISTS JSONB AS TEXT

# Disable Flyway ? pgvector migrations won't run on H2
spring.flyway.enabled=false
